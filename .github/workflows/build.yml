name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# ─── Reusable step: download FFmpeg essentials build ────────────────────────
# Used by the WinUI MSIX job and the Avalonia installer job so both apps
# ship ffmpeg.exe bundled in their installers.

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  build-electron:
    name: Build Electron App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: alvonia-ui/package-lock.json

      - name: Install dependencies
        working-directory: alvonia-ui
        run: npm ci

      - name: Build React app
        working-directory: alvonia-ui
        run: npm run build

      - name: Package Electron (Windows)
        working-directory: alvonia-ui
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: |
            alvonia-ui/dist/*.exe
            alvonia-ui/dist/*.appx
            alvonia-ui/dist/*.msix

  # ─────────────────────────────────────────────────────────────────────────
  build-winui:
    name: Build WinUI 3 MSIX (+ bundled FFmpeg)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # Download FFmpeg shared-lib build and place ffmpeg.exe + core DLLs in tools/ffmpeg/
      # The shared-lib build ships avcodec-*.dll, avformat-*.dll, avutil-*.dll etc.
      # alongside the executable – no separate FFmpeg installer needed at runtime.
      - name: Download & unpack FFmpeg (Windows x64, shared-lib)
        shell: pwsh
        run: |
          $ver  = "7.1"
          # Use the shared build so that avcodec-*.dll, avformat-*.dll, avutil-*.dll
          # are present alongside ffmpeg.exe and can be bundled inside the app package.
          $url  = "https://github.com/GyanD/codexffmpeg/releases/download/$ver/ffmpeg-$ver-full_build-shared.zip"
          $zip  = "$env:RUNNER_TEMP\ffmpeg.zip"
          Write-Host "Downloading FFmpeg $ver shared build from $url"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\ffmpeg_unpack" -Force

          $binDir = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg_unpack" -Recurse -Filter "ffmpeg.exe" `
                    | Where-Object { $_.DirectoryName -like "*bin*" } `
                    | Select-Object -First 1 -ExpandProperty DirectoryName

          New-Item -ItemType Directory -Force -Path "tools\ffmpeg" | Out-Null

          # Copy ffmpeg.exe
          Copy-Item "$binDir\ffmpeg.exe" "tools\ffmpeg\ffmpeg.exe" -Force
          Write-Host "Placed: tools\ffmpeg\ffmpeg.exe"

          # Copy ffplay.exe (used for live preview)
          if (Test-Path "$binDir\ffplay.exe") {
            Copy-Item "$binDir\ffplay.exe" "tools\ffmpeg\ffplay.exe" -Force
            Write-Host "Placed: tools\ffmpeg\ffplay.exe"
          }

          # Copy core shared DLLs: avcodec, avformat, avutil, avdevice, avfilter, swscale, swresample
          $dllPatterns = @("avcodec-*.dll","avformat-*.dll","avutil-*.dll",
                           "avdevice-*.dll","avfilter-*.dll","swscale-*.dll","swresample-*.dll")
          foreach ($pat in $dllPatterns) {
            Get-ChildItem "$binDir" -Filter $pat | ForEach-Object {
              Copy-Item $_.FullName "tools\ffmpeg\$($_.Name)" -Force
              Write-Host "Placed DLL: tools\ffmpeg\$($_.Name)"
            }
          }

          $copied = (Get-ChildItem "tools\ffmpeg" | Measure-Object).Count
          Write-Host "Total files in tools\ffmpeg: $copied"

      - name: Restore NuGet packages
        working-directory: winui
        run: nuget restore RecordIt.sln

      - name: Build WinUI MSIX
        working-directory: winui
        run: |
          msbuild RecordIt.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=SideloadOnly

      - name: Upload WinUI MSIX
        uses: actions/upload-artifact@v4
        with:
          name: winui-msix
          path: winui/RecordIt.Package/bin/x64/Release/**/*.msix

  # ─────────────────────────────────────────────────────────────────────────
  build-avalonia:
    name: Build Avalonia Installer (+ bundled FFmpeg)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Same FFmpeg shared-lib download as the WinUI job – bundles avcodec, avformat, avutil DLLs
      - name: Download & unpack FFmpeg (Windows x64, shared-lib)
        shell: pwsh
        run: |
          $ver  = "7.1"
          $url  = "https://github.com/GyanD/codexffmpeg/releases/download/$ver/ffmpeg-$ver-full_build-shared.zip"
          $zip  = "$env:RUNNER_TEMP\ffmpeg.zip"
          Write-Host "Downloading FFmpeg $ver shared build from $url"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\ffmpeg_unpack" -Force

          $binDir = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg_unpack" -Recurse -Filter "ffmpeg.exe" `
                    | Where-Object { $_.DirectoryName -like "*bin*" } `
                    | Select-Object -First 1 -ExpandProperty DirectoryName

          New-Item -ItemType Directory -Force -Path "tools\ffmpeg" | Out-Null
          Copy-Item "$binDir\ffmpeg.exe" "tools\ffmpeg\ffmpeg.exe" -Force
          Write-Host "Placed: tools\ffmpeg\ffmpeg.exe"

          # Copy ffplay.exe (used for live preview)
          if (Test-Path "$binDir\ffplay.exe") {
            Copy-Item "$binDir\ffplay.exe" "tools\ffmpeg\ffplay.exe" -Force
            Write-Host "Placed: tools\ffmpeg\ffplay.exe"
          }

          $dllPatterns = @("avcodec-*.dll","avformat-*.dll","avutil-*.dll",
                           "avdevice-*.dll","avfilter-*.dll","swscale-*.dll","swresample-*.dll")
          foreach ($pat in $dllPatterns) {
            Get-ChildItem "$binDir" -Filter $pat | ForEach-Object {
              Copy-Item $_.FullName "tools\ffmpeg\$($_.Name)" -Force
              Write-Host "Placed DLL: tools\ffmpeg\$($_.Name)"
            }
          }

      - name: Restore & publish Avalonia (self-contained, win-x64)
        run: |
          dotnet publish RecordIt.Avalonia/RecordIt.Avalonia.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -o RecordIt.Avalonia/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Avalonia installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "installers\RecordIt.Avalonia.iss"

      - name: Upload Avalonia installer
        uses: actions/upload-artifact@v4
        with:
          name: avalonia-installer
          path: installers/output/RecordIt-Avalonia-*-Setup.exe

  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-electron, build-winui, build-avalonia]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Electron artifacts
        uses: actions/download-artifact@v4
        with:
          name: electron-windows
          path: ./release-artifacts/electron

      - name: Download WinUI artifacts
        uses: actions/download-artifact@v4
        with:
          name: winui-msix
          path: ./release-artifacts/winui

      - name: Download Avalonia artifacts
        uses: actions/download-artifact@v4
        with:
          name: avalonia-installer
          path: ./release-artifacts/avalonia

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-artifacts/**/*
          generate_release_notes: true
          body: |
            ## RecordIt ${{ github.ref_name }}

            All installers include **FFmpeg bundled** — no separate FFmpeg install required.

            ### Downloads

            | Platform | App | Type | File |
            |----------|-----|------|------|
            | Windows 10/11 | WinUI 3 (native) | MSIX package | `RecordIt.msix` |
            | Windows 10/11 | Avalonia (cross-platform .NET) | NSIS installer | `RecordIt-Avalonia-*-Setup.exe` |
            | Windows | Electron | NSIS installer | `RecordIt-Setup-*.exe` |
            | Windows | Electron | AppX package | `RecordIt-*.appx` |

            ### Bundled FFmpeg
            FFmpeg ${{ env.FFMPEG_VERSION || '7.1' }} (essentials build by [Gyan.dev](https://www.gyan.dev/ffmpeg/builds/))
            is included in all Windows installers. You can override the path in
            **Settings → External Tools → FFmpeg Executable** if you prefer a
            different build (e.g. one with additional codecs).

            ### What's Changed
            See [Changelog](https://dotnetappdev.github.io/recordit/docs.html#changelog) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
